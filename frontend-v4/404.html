<!doctype html>
<html lang="en" translate="no">
<head>
<meta charset="utf-8" />
<title>404 — ZEALWISH</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="google" content="notranslate" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0A0A0B" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230A0A0B'/%3E%3Cpath d='M10 12h12l5 23 8-23h10l8 23 5-23h6L52 52H40l-8-22-8 22H12z' fill='%23FF2D2D'/%3E%3C/svg%3E" />
<style>
  :root {
    --bg-base: #0A0A0B;
    --accent: #FF2D2D;
    --ink: #F5F5F7;
    --ink-muted: rgba(245, 245, 247, 0.64);
    --ink-faint: rgba(245, 245, 247, 0.40);
    --hairline: rgba(255, 255, 255, 0.08);
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    --font-body: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body { overflow-x: hidden; overflow-x: clip; }
  body {
    margin: 0;
    min-height: 100svh;
    display: grid;
    place-items: center;
    padding: 32px 20px;
    background: var(--bg-base);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* subtle red radial glow + faint grid */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
      radial-gradient(circle at 50% 32%, rgba(255,45,45,0.12), transparent 42%),
      var(--bg-base);
    background-size: 44px 44px, 44px 44px, auto, auto;
  }

  main {
    position: relative;
    z-index: 1;
    max-width: 560px;
    width: 100%;
    text-align: center;
  }

  ::selection { background: rgba(255,45,45,.45); color: #F5F5F7; }

  .wordmark {
    display: inline-block;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
  }
  .wordmark b { color: var(--accent); font-weight: 800; }

  .eyebrow {
    margin: 36px 0 14px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .eyebrow::before,
  .eyebrow::after { content: "//"; color: var(--ink-faint); margin: 0 10px; }

  h1 {
    margin: 0 0 14px;
    font-weight: 800;
    font-size: clamp(34px, 9vw, 58px);
    line-height: 0.98;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }
  h1 span { color: var(--accent); }

  p {
    margin: 0 auto 30px;
    max-width: 42ch;
    color: var(--ink-muted);
    font-size: 16px;
    line-height: 1.55;
  }

  .code {
    margin: 0 0 6px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-faint);
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
  }

  .edge {
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  }

  .primary-button,
  .secondary-button {
    display: inline-block;
    padding: 14px 26px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
  }
  .primary-button {
    background: var(--accent);
    color: #0A0A0B;
  }
  .secondary-button {
    background: rgba(255, 255, 255, 0.05);
    color: var(--ink);
    box-shadow: inset 0 0 0 1px var(--hairline);
  }

  @media (prefers-reduced-motion: no-preference) {
    main {
      animation: rise 320ms var(--ease-out) both;
    }
    .primary-button,
    .secondary-button {
      transition: transform 200ms var(--ease-out), background 200ms var(--ease-out), box-shadow 200ms var(--ease-out);
    }
    .primary-button:hover { transform: translateY(-2px); background: #FF4545; }
    .secondary-button:hover { transform: translateY(-2px); box-shadow: inset 0 0 0 1px rgba(255,45,45,.5); }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
  }
</style>
</head>
<body>
<main>
  <a class="wordmark" href="/index.html" aria-label="ZEALWISH home">ZEAL<b>WISH</b></a>
  <div class="eyebrow">Signal lost</div>
  <h1>This route does <span>not</span> exist.</h1>
  <p class="code">HTTP 404 / route unresolved</p>
  <p>The page you asked for is outside the map. Head back to the landing, or jump straight into the workspace.</p>
  <div class="actions">
    <a class="primary-button edge" href="/index.html">Back to ZEALWISH</a>
    <a class="secondary-button edge" href="/web.html#/home">Open the workspace</a>
  </div>
</main>
</body>
</html>
