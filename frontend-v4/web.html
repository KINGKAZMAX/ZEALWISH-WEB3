<style>
  :root {
    --black: #0A0A0B;
    --elev-1: #101013;
    --elev-2: #16161A;
    --elev-3: #1D1D23;

    --red: #FF2D2D;

  }
  * { box-sizing: border-box; }
  html { overflow-x: hidden; }
  body {

    overflow-x: hidden;

      linear-gradient(rgba(255,255,255,0.024) 1px, transparent 1px),

    background-size: 36px 36px, 36px 36px, auto, auto;

    font-family: Archivo, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button, input, textarea, select { font: inherit; }
  button { cursor: pointer; }
  button:disabled { cursor: not-allowed; opacity: .48; }
  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: 2px solid var(--red);

    box-shadow: 0 0 0 6px rgba(255,45,45,.18);
  }
  img { display: block; max-width: 100%; }
  #root { min-height: 100vh; }
  ::selection { background: rgba(255,45,45,.45); color: var(--white); }
  * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.18) transparent; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }

  .boot-screen { min-height: 100vh; display: grid; place-content: center; justify-items: center; gap: 14px; }

  .boot-pulse { width: 10px; height: 10px; border-radius: 50%; background: var(--red); animation: zealwishVoicePulse 1.2s ease-in-out infinite; }
  .boot-screen .mono { color: var(--faint); font-size: 10px; letter-spacing: .3em; text-transform: uppercase; }
  .app-crash { min-height: 100vh; display: grid; place-content: center; justify-items: center; gap: 12px; text-align: center; padding: 24px; }
  .app-crash b { font-family: Teko, Archivo, sans-serif; font-size: 56px; line-height: .84; letter-spacing: .04em; text-transform: uppercase; }
  .app-crash p { margin: 0; color: var(--muted); }
  .app-crash .app-crash-note { color: var(--faint); font-size: 13px; }
  .app-crash-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; }
  @media (prefers-reduced-motion: no-preference) {
    .workspace > * { animation: viewEnter 360ms var(--ease) both; }

  @keyframes viewEnter { from { opacity: 0; transform: translateY(10px); } }

  .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .display { font-family: Teko, Archivo, sans-serif; letter-spacing: 0.03em; text-transform: uppercase; }
  .edge { clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px)); }

  /* ---------- Shell ---------- */
  .web-app-shell { min-height: 100vh; display: grid; grid-template-columns: 280px minmax(0, 1fr) 330px; }
  .app-sidebar {

  .sidebar-brand span { display: block; margin-top: 12px; color: var(--red); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; }
  .module-nav { display: grid; align-content: start; background: rgba(255,45,45,.5); gap: 1px; }
  .module-nav a { min-height: 80px; padding: 15px 20px; background: var(--black); transition: background 200ms var(--ease), transform 200ms var(--ease); }
  .module-nav a:hover, .module-nav a.is-active { background: var(--red); transform: translateX(4px); }
  .module-nav .code { display: block; font-size: 11px; opacity: .72; letter-spacing: .16em; }
  .module-nav b { display: block; margin-top: 8px; font-family: Teko, Archivo, sans-serif; font-size: 32px; line-height: .82; text-transform: uppercase; }
  .module-nav small { display: block; margin-top: 6px; color: currentColor; opacity: .72; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; }
  .sidebar-footer { padding: 18px 20px; color: var(--faint); font-size: 11px; line-height: 1.55; }
  .app-main { min-width: 0; display: grid; grid-template-rows: auto 1fr; }
  .app-topbar {
    position: sticky; top: 0; z-index: 5; min-height: 76px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 18px clamp(18px, 4vw, 46px);
    border-bottom: 1px solid rgba(255,45,45,.3);
    background: linear-gradient(180deg, rgba(10,10,11,.96), rgba(10,10,11,.78));

  }
  .crumb { color: var(--muted); font-size: 12px; letter-spacing: .16em; text-transform: uppercase; }
  .top-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
  .button-primary, .button-secondary {
    min-height: 44px; border: 1px solid var(--red); border-radius: 0; padding: 0 16px;

    transition: transform 200ms var(--ease), box-shadow 200ms var(--ease), background 200ms var(--ease);
  }
  .button-primary { background: var(--red); color: var(--white); box-shadow: 0 16px 42px var(--red-glow); }
  .button-primary:hover { background: var(--red-deep); transform: translateY(-1px); }
  .button-secondary { background: rgba(0,0,0,.28); color: var(--white); }
  .button-secondary:hover { background: rgba(255,45,45,.14); }
  .workspace { padding: clamp(18px, 3vw, 34px); }
  .app-inspector {
    position: sticky; top: 0; height: 100vh;
    border-left: 1px solid rgba(255,45,45,.3);
    background: var(--elev-1);
    padding: 18px; display: grid; align-content: start; gap: 14px; overflow: auto;
  }
  .inspector-block { border: 1px solid rgba(255,45,45,.44); background: linear-gradient(180deg, rgba(255,45,45,.1), transparent 48%), var(--panel); padding: 18px; }
  .inspector-block.compact { background: var(--panel-soft); }
  .inspector-block .code { color: var(--red); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; }
  .inspector-block h2 { margin: 12px 0 16px; font-family: Teko, Archivo, sans-serif; font-size: 42px; line-height: .84; text-transform: uppercase; }
  .inspector-block p { margin: 10px 0; color: var(--muted); line-height: 1.55; }
  .inspector-block small { display: block; color: var(--faint); line-height: 1.55; }
  .integrity-list { display: grid; gap: 1px; background: rgba(255,45,45,.3); }
  .integrity-row, .signal-row { display: grid; gap: 8px; padding: 11px 12px; background: var(--elev-1); }
  .integrity-row span, .signal-row span { color: var(--faint); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; }
  .integrity-row strong, .signal-row b { color: var(--white); font-size: 12px; overflow-wrap: anywhere; }

  /* ---------- Common blocks ---------- */
  .page-title { max-width: 860px; margin-bottom: 18px; }
  .page-title .eyebrow { color: var(--red); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; }
  .page-title h1 { margin: 10px 0 0; font-family: Teko, Archivo, sans-serif; font-size: clamp(48px, 6vw, 88px); line-height: .82; text-transform: uppercase; }
  .page-title p { margin: 10px 0 0; max-width: 620px; color: var(--muted); font-size: 15px; line-height: 1.5; }
  .grid-two { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(280px, .68fr); gap: 16px; }
  .panel { min-width: 0; border: 1px solid var(--line-red); background: linear-gradient(180deg, rgba(255,45,45,.08), transparent 42%), var(--panel); padding: clamp(18px, 2vw, 24px); }
  .panel .code { color: var(--red); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; }
  .panel h2 { margin: 10px 0 12px; font-family: Teko, Archivo, sans-serif; font-size: clamp(32px, 4vw, 52px); line-height: .84; text-transform: uppercase; }
  .panel p { color: var(--muted); line-height: 1.5; }
  .glass-panel {
    background: rgba(22,22,26,.55);
    backdrop-filter: blur(18px) saturate(1.2);
    -webkit-backdrop-filter: blur(18px) saturate(1.2);
    border: 1px solid rgba(255,255,255,.09);
  }
  .field-label { display: block; margin: 12px 0 8px; color: var(--faint); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; }
  .field { width: 100%; border: 1px solid rgba(255,45,45,.5); background: rgba(0,0,0,.5); color: var(--white); outline: 0; padding: 13px 14px; border-radius: 0; }
  .field:focus { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,45,45,.18); }
  textarea.field { min-height: 104px; resize: vertical; }
  select.field { appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--red) 50%), linear-gradient(135deg, var(--red) 50%, transparent 50%); background-position: calc(100% - 20px) 50%, calc(100% - 14px) 50%; background-size: 6px 6px; background-repeat: no-repeat; }
  .settings-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
  .action-status, .copy-status { min-height: 20px; margin-top: 12px; color: var(--muted); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
  .error { color: #ff8a8a; }

  /* ---------- Presence (idle breathing / speaking / listening) ---------- */
  .presence { position: relative; display: grid; justify-items: center; gap: 10px; }
  .presence img { width: 100%; max-width: 220px; filter: drop-shadow(0 24px 42px rgba(0,0,0,.72)); transition: filter 320ms var(--ease); }
  .presence-hero img { max-width: 300px; }
  .presence-ring { position: absolute; top: 6%; left: 50%; transform: translateX(-50%); width: 72%; aspect-ratio: 1; border-radius: 50%; border: 1px solid rgba(255,45,45,.0); pointer-events: none; }
  .presence.is-listening .presence-ring { border-color: rgba(255,45,45,.7); animation: presenceListen 1.4s ease-in-out infinite; }
  .presence.is-speaking img { filter: drop-shadow(0 24px 52px var(--red-glow)); }
  .presence-state { display: inline-flex; align-items: center; gap: 8px; color: var(--faint); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; }
  .presence.is-speaking .presence-state, .presence.is-listening .presence-state { color: var(--red); }
  .waveform { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; }
  .waveform i { width: 3px; height: 3px; background: currentColor; opacity: .35; }
  .waveform.is-active i { animation: waveBar 900ms ease-in-out infinite; opacity: 1; }
  @keyframes waveBar { 0%, 100% { height: 3px; } 50% { height: 12px; } }
  @keyframes presenceListen { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,45,45,.35); } 50% { box-shadow: 0 0 0 16px rgba(255,45,45,0); } }
  @media (prefers-reduced-motion: no-preference) {
    .presence.is-idle img { animation: presenceBreath 4s ease-in-out infinite; }
  }
  @keyframes presenceBreath { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015); } }

  /* ---------- Home: bento ---------- */
  .workspace-dashboard { display: grid; gap: 18px; }
  .dashboard-header { display: flex; align-items: end; justify-content: space-between; gap: 20px; padding-bottom: 18px; border-bottom: 1px solid rgba(255,45,45,.3); }
  .dashboard-header .eyebrow { color: var(--red); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; }
  .dashboard-header h1 { margin: 10px 0 0; font-family: Teko, Archivo, sans-serif; font-size: clamp(54px, 7vw, 96px); line-height: .82; text-transform: uppercase; }
  .dashboard-header p { max-width: 720px; margin: 14px 0 0; color: var(--muted); line-height: 1.62; }
  .bento-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); grid-auto-rows: minmax(150px, auto); gap: 12px; }
  .bento-card {
    min-width: 0; border: 1px solid var(--line); background: var(--elev-1);
    padding: 18px; display: grid; align-content: start; gap: 10px;
    transition: transform 200ms var(--ease), border-color 200ms var(--ease), background 200ms var(--ease);
  }
  .bento-card:hover { transform: translateY(-3px); border-color: rgba(255,45,45,.55); }
  .bento-presence { grid-column: span 2; grid-row: span 2; cursor: pointer; display: grid; grid-template-columns: minmax(0, .8fr) minmax(0, 1fr); align-items: center; gap: 18px; background: linear-gradient(160deg, rgba(255,45,45,.1), transparent 55%), var(--elev-1); border-color: rgba(255,45,45,.4); }
  .bento-presence-meta span.mono { color: var(--red); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; }
  .bento-presence-meta h2 { margin: 8px 0; font-family: Teko, Archivo, sans-serif; font-size: clamp(40px, 4vw, 64px); line-height: .82; text-transform: uppercase; }
  .bento-presence-meta p { margin: 0; color: var(--muted); line-height: 1.5; font-size: 14px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .bento-cta { display: inline-block; margin-top: 12px; color: var(--red); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; }
  .bento-label { color: var(--red); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; }
  .bento-memory { margin: 0; color: var(--white); line-height: 1.5; font-size: 14px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .bento-strong { margin: 0; font-family: Teko, Archivo, sans-serif; font-size: 30px; line-height: .9; text-transform: uppercase; }
  .bento-card small { color: var(--faint); }
  .bento-link { justify-self: start; margin-top: auto; border: 0; background: none; padding: 0; color: var(--muted); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; transition: color 200ms var(--ease); }
  .bento-link:hover { color: var(--red); }
  .stat-strip { display: flex; flex-wrap: wrap; gap: 10px 28px; padding: 14px 18px; border: 1px solid var(--line); background: var(--elev-1); color: var(--faint); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; }

  /* ---------- Create ---------- */
  .passport-preview { display: grid; align-content: start; min-height: 420px; }
  .portrait-frame { position: relative; width: min(260px, 68%); justify-self: center; margin-bottom: 14px; }
  .portrait-frame img { width: 100%; filter: drop-shadow(0 24px 42px rgba(0,0,0,.72)); }
  .portrait-frame.is-rendering::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,45,45,.18) 50%, transparent 70%);
    background-size: 220% 100%; animation: portraitShimmer 1.4s linear infinite;
  }
  @keyframes portraitShimmer { 0% { background-position: 130% 0; } 100% { background-position: -130% 0; } }
  .portrait-note { color: var(--faint); font-size: 11px; }

    text-align: left; border: 1px solid var(--line); background: var(--panel-soft); color: var(--white);

    transition: border-color 200ms var(--ease), background 200ms var(--ease), transform 200ms var(--ease);
  }
  .style-chip:hover { border-color: rgba(255,45,45,.6); transform: translateY(-1px); }

  .seed-chips { display: flex; flex-wrap: wrap; gap: 8px; }

    border: 1px solid var(--line); background: rgba(0,0,0,.3); color: var(--muted);

    transition: border-color 200ms var(--ease), color 200ms var(--ease), background 200ms var(--ease);
  }
  .seed-chip:hover { border-color: rgba(255,45,45,.6); color: var(--white); }
  .seed-chip.is-active { border-color: var(--red); color: var(--white); background: rgba(255,45,45,.14); }
  .photo-drop {
    width: 100%; border: 1px dashed rgba(255,45,45,.45); background: rgba(0,0,0,.3); color: var(--muted);
    padding: 12px 14px; font-size: 11px; letter-spacing: .06em; text-align: center;
    transition: border-color 200ms var(--ease), color 200ms var(--ease);
  }
  .photo-drop:hover { border-color: var(--red); color: var(--white); }
  .create-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
  .create-actions .button-primary, .create-actions .button-secondary { flex: 1 1 150px; min-width: 150px; padding: 0 8px; font-size: 11px; letter-spacing: .06em; white-space: nowrap; }
  .create-meta { margin-top: 12px; color: var(--faint); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; }
  .backdrop-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    width: 30px; height: 30px; border-radius: 50%; padding: 0; cursor: pointer;

  .backdrop-swatch:hover { transform: scale(1.1); }

  .backdrop-custom { display: inline-flex; align-items: center; justify-content: center; overflow: hidden; color: var(--white); font-size: 16px; font-weight: 700; }
  .backdrop-custom input[type="color"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; border: 0; }
  .portrait-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
  .portrait-cell { position: relative; }
  .portrait-option { display: block; width: 100%; padding: 0; border: 1px solid var(--line); background: var(--elev-1); overflow: hidden; cursor: pointer; aspect-ratio: 1; transition: border-color 200ms var(--ease), transform 200ms var(--ease); }
  .portrait-option img { width: 100%; height: 100%; object-fit: cover; }
  .portrait-cell:hover .portrait-option { transform: translateY(-2px); border-color: rgba(255,45,45,.6); }
  .portrait-cell.is-active .portrait-option { border-color: var(--red); box-shadow: 0 0 0 2px var(--red-glow); }
  .portrait-save {
    position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,.18); background: rgba(10,10,11,.72); color: var(--white);
    font-size: 14px; border-radius: 4px; backdrop-filter: blur(6px);
    opacity: 0; transition: opacity 200ms var(--ease), background 200ms var(--ease), border-color 200ms var(--ease);
  }
  .portrait-cell:hover .portrait-save, .portrait-save:focus-visible { opacity: 1; }
  .portrait-save:hover { background: var(--red); border-color: var(--red); }
  @media (hover: none) { .portrait-save { opacity: 1; } }
  .portrait-skeleton {
    aspect-ratio: 1; border: 1px solid var(--line); background: var(--elev-1); position: relative; overflow: hidden;
  }
  @media (prefers-reduced-motion: no-preference) {
    .portrait-skeleton::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(110deg, transparent 30%, rgba(255,45,45,.14) 50%, transparent 70%);
      background-size: 220% 100%; animation: portraitShimmer 1.3s linear infinite;
    }

  /* ---------- Talk: voice-first stage ---------- */
