version: '3.8'

services:
  ocworld-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocworld-web
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    # Optional: mount a custom nginx config
    # volumes:
    #   - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ocworld-network

  # Optional: Backend API service
  # ocworld-api:
  #   build:
  #     context: ./api
  #     dockerfile: Dockerfile
  #   container_name: ocworld-api
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #     - PORT=3000
  #   restart: unless-stopped
  #   networks:
  #     - ocworld-network

networks:
  ocworld-network:
    driver: bridge
